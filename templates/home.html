<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
  </head>
  <body>
    <div class="login">
      <h1>FWI Prediction</h1>
      <!-- Main Input for Receiving Query to our ML -->
      <form action="{{ url_for('predict_datapoint')}}" method="post">
        <input
          type="text"
          name="Temperature"
          placeholder="Temperature"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="RH"
          placeholder="RH"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="Ws"
          placeholder="Ws"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="Rain"
          placeholder="Rain"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="FFMC"
          placeholder="FFMC"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="DMC"
          placeholder="DMC"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="ISI"
          placeholder="ISI"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="Classes"
          placeholder="Classes"
          required="required"
        /><br /><br />
        <input
          type="text"
          name="Region"
          placeholder="Region"
          required="required"
        /><br /><br />

        <button type="submit" class="btn btn-primary btn-block btn-large">
          Predict
        </button>
      </form>
      <h2>The FWI Prediction is {{results}}</h2>
    </div>
  </body>
</html>
